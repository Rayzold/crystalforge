<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Equipment Sheet — standalone demo</title>
<link rel="stylesheet" href="themes.css">
<style>
  html,body{ margin:0; background:#0a0f1a; color:#dceafa; font-family:system-ui,sans-serif; }
  .demo-wrap{ display:flex; flex-wrap:wrap; gap:32px; justify-content:center; padding:32px; }
  .demo-col{ display:flex; flex-direction:column; gap:10px; align-items:center; }
  .demo-cap{ font:600 13px/1 system-ui; letter-spacing:.14em; text-transform:uppercase; color:#79d3ef; }
</style>
</head>
<body>
<div class="demo-wrap">
  <div class="demo-col">
    <div class="demo-cap">Male</div>
    <div class="theme-hud" style="width:820px"><div id="male"></div></div>
  </div>
  <div class="demo-col">
    <div class="demo-cap">Female</div>
    <div class="theme-hud" style="width:820px"><div id="female"></div></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="silhouettes.jsx"></script>
<script type="text/babel" src="equipment-doll.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("male")).render(<window.EquipmentDoll gender="male" />);
  ReactDOM.createRoot(document.getElementById("female")).render(<window.EquipmentDoll gender="female" />);
</script>
</body>
</html>
